name: BGTraffic · data collector v2.4.0

on:
  workflow_dispatch:
  schedule:
    - cron: '7,22,37,52 * * * *'

permissions:
  contents: write

concurrency:
  group: bgtraffic-data-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BGTOLL_TRAFFIC_PAGE: https://bgtoll.bg/traffic_passes/
      BGTOLL_WEATHER_PAGE: https://bgtoll.bg/mto/
      MVR_ACCIDENTS_PAGE: https://www.mvr.bg/map/apps/dashboards/0b7065b1f1d34d7d8ad530c51434a9f0
      BGTRAFFIC_MIN_RECORDS: '10'
      BGTRAFFIC_WAIT_MS: '30000'
      BGTRAFFIC_OUTPUT_FILE: collector-output/latest.json
      BGTRAFFIC_WEATHER_OUTPUT: collector-output/weather.json
      BGTRAFFIC_ACCIDENTS_OUTPUT: collector-output/accidents.json
      BGTRAFFIC_WEATHER_MIN_RECORDS: '5'
      MVR_MIN_RECORDS: '10'
      MVR_MAX_RECORDS: '50000'
      MVR_FROM_YEAR: '2024'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install collector
        working-directory: collector
        run: npm install --no-audit --no-fund

      - name: Install Chromium
        working-directory: collector
        run: npx playwright install --with-deps chromium

      - name: Collect live traffic
        working-directory: collector
        run: npm run collect:traffic

      - name: Add vehicle types from latest archive
        working-directory: collector
        run: npm run enrich:vehicles
        continue-on-error: true

      # Traffic is published immediately. Weather/MVR failures can no longer leave latest.json stale.
      - name: Publish fresh traffic feed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test -s collector/collector-output/latest.json
          rm -rf /tmp/bgtraffic-feed
          git clone --depth 1 --branch data "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/bgtraffic-feed 2>/dev/null || {
            mkdir -p /tmp/bgtraffic-feed
            cd /tmp/bgtraffic-feed
            git init
            git checkout -b data
          }
          cp collector/collector-output/latest.json /tmp/bgtraffic-feed/latest.json
          cd /tmp/bgtraffic-feed
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.json
          if ! git diff --cached --quiet; then
            git commit -m "Update live traffic $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git remote remove origin 2>/dev/null || true
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin data
          fi

      - name: Collect road weather
        id: weather
        working-directory: collector
        run: npm run collect:weather
        continue-on-error: true

      - name: Collect MVR accidents
        id: accidents
        working-directory: collector
        run: npm run collect:accidents
        continue-on-error: true

      - name: Publish optional feeds
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm -rf /tmp/bgtraffic-optional
          git clone --depth 1 --branch data "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/bgtraffic-optional
          cd /tmp/bgtraffic-optional
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if test -s "$GITHUB_WORKSPACE/collector/collector-output/weather.json"; then
            cp "$GITHUB_WORKSPACE/collector/collector-output/weather.json" weather.json
            git add weather.json
          fi
          if test -s "$GITHUB_WORKSPACE/collector/collector-output/accidents.json"; then
            cp "$GITHUB_WORKSPACE/collector/collector-output/accidents.json" accidents.json
            git add accidents.json
          fi
          if ! git diff --cached --quiet; then
            git commit -m "Update weather and accident feeds $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin data
          fi

      - name: Collector summary
        if: always()
        run: |
          echo "## BGTraffic collector" >> "$GITHUB_STEP_SUMMARY"
          echo "- Traffic: published before optional collectors" >> "$GITHUB_STEP_SUMMARY"
          echo "- Weather step: ${{ steps.weather.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Accidents step: ${{ steps.accidents.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          test -f collector/collector-output/latest.json && echo "- latest.json: yes" >> "$GITHUB_STEP_SUMMARY" || true
          test -f collector/collector-output/weather.json && echo "- weather.json: yes" >> "$GITHUB_STEP_SUMMARY" || true
          test -f collector/collector-output/accidents.json && echo "- accidents.json: yes" >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bgtraffic-diagnostics-${{ github.run_id }}
          path: collector/collector-diagnostics/
          if-no-files-found: ignore
          retention-days: 7
