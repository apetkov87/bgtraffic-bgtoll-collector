name: BGTraffic · BGTOLL live traffic v1.2.0

on:
  workflow_dispatch:
  schedule:
    - cron: '7,22,37,52 * * * *'

permissions:
  contents: write

concurrency:
  group: bgtraffic-bgtoll-live
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BGTOLL_TRAFFIC_PAGE: https://bgtoll.bg/traffic_passes/
      BGTRAFFIC_MIN_RECORDS: '10'
      BGTRAFFIC_WAIT_MS: '30000'
      BGTRAFFIC_OUTPUT_FILE: collector-output/latest.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install collector
        working-directory: collector
        run: npm install --no-audit --no-fund

      - name: Install Chromium
        working-directory: collector
        run: npx playwright install --with-deps chromium

      - name: Collect BGTOLL traffic
        working-directory: collector
        run: npm run collect

      - name: Publish latest feed to data branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test -s collector/collector-output/latest.json
          rm -rf /tmp/bgtraffic-feed
          mkdir -p /tmp/bgtraffic-feed
          cp collector/collector-output/latest.json /tmp/bgtraffic-feed/latest.json
          cd /tmp/bgtraffic-feed
          git init
          git checkout -b data
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git commit -m "Update BGTOLL traffic feed $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin data

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bgtoll-traffic-diagnostics-${{ github.run_id }}
          path: collector/collector-diagnostics/
          if-no-files-found: ignore
          retention-days: 7
