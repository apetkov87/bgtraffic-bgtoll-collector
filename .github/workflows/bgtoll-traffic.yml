name: BGTraffic · BGTOLL live traffic

on:
  workflow_dispatch:
  schedule:
    - cron: '7,22,37,52 * * * *'

permissions:
  contents: read

concurrency:
  group: bgtraffic-bgtoll-live
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: collector
    env:
      BGTRAFFIC_INGEST_URL: ${{ secrets.BGTRAFFIC_INGEST_URL }}
      BGTRAFFIC_INGEST_TOKEN: ${{ secrets.BGTRAFFIC_INGEST_TOKEN }}
      BGTOLL_TRAFFIC_PAGE: https://bgtoll.bg/traffic_passes/
      BGTRAFFIC_MIN_RECORDS: '10'
      BGTRAFFIC_WAIT_MS: '30000'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install collector
        run: npm install --no-audit --no-fund

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Collect and import
        run: npm run collect

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bgtoll-traffic-diagnostics-${{ github.run_id }}
          path: collector/collector-diagnostics/
          if-no-files-found: ignore
          retention-days: 7
