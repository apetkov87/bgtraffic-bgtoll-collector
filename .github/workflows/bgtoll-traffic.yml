name: BGTraffic · all data v2.0.0

on:
  workflow_dispatch:
  schedule:
    - cron: '7,22,37,52 * * * *'

permissions:
  contents: write

concurrency:
  group: bgtraffic-all-data
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BGTOLL_TRAFFIC_PAGE: https://bgtoll.bg/traffic_passes/
      BGTOLL_WEATHER_PAGE: https://bgtoll.bg/mto/
      BGTOLL_OPEN_DATA_PAGE: https://bgtoll.bg/otvoreni-danni
      MVR_ACCIDENTS_PAGE: https://www.mvr.bg/map/apps/dashboards/0b7065b1f1d34d7d8ad530c51434a9f0
      BGTRAFFIC_MIN_RECORDS: '10'
      BGTRAFFIC_WAIT_MS: '30000'
      BGTRAFFIC_OUTPUT_FILE: collector-output/latest.json
      BGTRAFFIC_WEATHER_OUTPUT: collector-output/weather.json
      BGTRAFFIC_ACCIDENTS_OUTPUT: collector-output/accidents.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install collector
        working-directory: collector
        run: npm install --no-audit --no-fund
      - name: Install Chromium
        working-directory: collector
        run: npx playwright install --with-deps chromium
      - name: Collect live traffic
        working-directory: collector
        run: npm run collect:traffic
      - name: Add vehicle types from latest archive
        working-directory: collector
        run: npm run enrich:vehicles
        continue-on-error: true
      - name: Collect road weather
        working-directory: collector
        run: npm run collect:weather
        continue-on-error: true
      - name: Collect MVR accidents
        working-directory: collector
        run: npm run collect:accidents
        continue-on-error: true
      - name: Publish feeds to data branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test -s collector/collector-output/latest.json
          rm -rf /tmp/bgtraffic-feed
          git clone --depth 1 --branch data "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/bgtraffic-feed 2>/dev/null || mkdir -p /tmp/bgtraffic-feed
          rm -rf /tmp/bgtraffic-feed/.git
          cp collector/collector-output/*.json /tmp/bgtraffic-feed/ 2>/dev/null || true
          cd /tmp/bgtraffic-feed
          git init && git checkout -b data
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add . && git commit -m "Update BGTraffic feeds $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin data
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bgtraffic-diagnostics-${{ github.run_id }}
          path: collector/collector-diagnostics/
          if-no-files-found: ignore
          retention-days: 7
